<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="ad.size" content="width=320,height=60">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Моне — mobile</title>
  <link rel="stylesheet" href="style.css">

      link: "%banner.user1%",
      target: "%banner.target%",
      rnd: parseInt("%request.place_random%") || parseInt("%system.random%"),
      events: [
        "",
        "%banner.event1%",
        "%banner.event2%",
        "%banner.event3%",
        "%banner.event4%",
        "%banner.event5%",
        "%banner.event6%",

        "%banner.event19%",

  <script type="text/javascript" src="https://banners.adfox.ru/files/adfox_HTML5.js"></script>
</head>
<body>
  <div class="click-area" aria-label="Моне">
    <div class="banner">
      <div class="frame frame-1">
        <div class="photo-wrap">
          <img class="photo" src="images/parkovye_kvartaly_700x394.jpg" alt="">
        </div>
        <div class="photo-rail" aria-hidden="true"></div>
        <div class="right-rail" aria-hidden="true"></div>
        <div class="headline">
          <div class="headline-line headline-line-1">Квартиры в центре</div>
          <div class="headline-line headline-line-2">города Симферополь</div>
        </div>
      </div>

      <div class="frame frame-2">
        <div class="photo-wrap">
          <img class="photo" src="images/parkovye_kvartaly2_700x394.jpg" alt="">
        </div>
        <div class="photo-rail" aria-hidden="true"></div>
        <div class="right-rail" aria-hidden="true"></div>
      </div>

      <img class="shared-logo" src="images/logo.svg" alt="Моне">
      <div class="shared-title">ЖК Моне</div>

      <div class="frame frame-3">
        <div class="disclaimer">
          <div>РЕКЛАМА. РЕКЛАМОДАТЕЛЬ ООО «ИНТЕР СТРОЙ»,</div>
          <div>ИНН 9102257308. ЗАСТРОЙЩИК ООО «CЗ «АМУРСКИЙ».</div>
          <div>ПРОЕКТНАЯ ДЕКЛАРАЦИЯ НА НАШ.ДОМ.РФ.</div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
